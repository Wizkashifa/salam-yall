<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ummah Connect Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0C0C0C; color: #F5F5F5; min-height: 100vh; }
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card { background: #161616; border: 1px solid #252525; border-radius: 16px; padding: 40px; max-width: 360px; width: 100%; text-align: center; }
    .login-card h1 { font-size: 22px; color: #D4A843; margin-bottom: 8px; }
    .login-card p { font-size: 13px; color: #9CA3AF; margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 12px 16px; background: #1E1E1E; border: 1px solid #333; border-radius: 10px; color: #F5F5F5; font-size: 15px; outline: none; margin-bottom: 16px; }
    .login-card input:focus { border-color: #D4A843; }
    .login-card button { width: 100%; padding: 12px; background: #1B6B4A; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .login-card button:hover { background: #14523A; }
    .login-error { color: #F87171; font-size: 13px; margin-bottom: 12px; display: none; }

    .app-wrap { display: none; max-width: 600px; margin: 0 auto; padding: 20px; padding-top: 110px; padding-bottom: 40px; }
    .top-bar { position: fixed; top: 0; left: 0; right: 0; background: #161616; border-bottom: 1px solid #252525; z-index: 10; }
    .top-bar-inner { max-width: 600px; margin: 0 auto; padding: 14px 20px 0; }
    .top-bar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .top-bar h1 { font-size: 16px; color: #D4A843; }
    .top-bar button.sign-out { background: none; border: 1px solid #333; color: #9CA3AF; padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .top-bar button.sign-out:hover { color: #F5F5F5; border-color: #555; }

    .tab-bar { display: flex; gap: 0; }
    .tab-btn { flex: 1; padding: 10px 0; font-size: 13px; font-weight: 600; color: #6B7280; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { color: #9CA3AF; }
    .tab-btn.active { color: #D4A843; border-bottom-color: #D4A843; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section { background: #161616; border: 1px solid #252525; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 15px; font-weight: 700; color: #D4A843; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title .icon { font-size: 16px; }

    label { display: block; font-size: 12px; color: #9CA3AF; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    textarea, input[type="text"], input[type="datetime-local"], select {
      width: 100%; padding: 10px 14px; background: #1E1E1E; border: 1px solid #333; border-radius: 10px;
      color: #F5F5F5; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 14px;
    }
    textarea { resize: vertical; min-height: 80px; }
    textarea:focus, input:focus, select:focus { border-color: #D4A843; }

    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }

    .btn { padding: 10px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #1B6B4A; color: #fff; }
    .btn-primary:hover { background: #14523A; }
    .btn-gold { background: #D4A843; color: #0C0C0C; }
    .btn-gold:hover { background: #B8922E; }
    .btn-danger { background: #7F1D1D; color: #FCA5A5; }
    .btn-danger:hover { background: #991B1B; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .message-list { list-style: none; }
    .message-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1E1E1E; }
    .message-item:last-child { border-bottom: none; }
    .message-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.5px; white-space: nowrap; margin-top: 2px; }
    .badge-info { background: #2A2318; color: #D4A843; }
    .badge-urgent { background: #2A1818; color: #F87171; }
    .badge-event { background: #1A2E22; color: #6EE7B7; }
    .badge-reminder { background: #1E1E3A; color: #A5B4FC; }
    .message-text { flex: 1; font-size: 13px; line-height: 1.5; color: #E5E5E5; }
    .message-meta { font-size: 11px; color: #6B7280; margin-top: 4px; }
    .message-actions { display: flex; align-items: flex-start; }

    .empty-state { text-align: center; padding: 20px; color: #6B7280; font-size: 13px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1B6B4A; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; display: none; z-index: 100; }
    .toast.error { background: #7F1D1D; color: #FCA5A5; }
    .loading { text-align: center; padding: 16px; color: #6B7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <h1>Ummah Connect</h1>
      <p>Admin Dashboard</p>
      <div class="login-error" id="loginError">Incorrect password</div>
      <input type="password" id="passwordInput" placeholder="Enter admin password" autocomplete="current-password">
      <button onclick="doLogin()">Sign In</button>
    </div>
  </div>

  <div class="app-wrap" id="appWrap">
    <div class="top-bar">
      <div class="top-bar-inner">
        <div class="top-bar-header">
          <h1>Ummah Connect Admin</h1>
          <button class="sign-out" onclick="doLogout()">Sign Out</button>
        </div>
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="comms" onclick="switchTab('comms')">Notifications & Ticker</button>
          <button class="tab-btn" data-tab="businesses" onclick="switchTab('businesses')">Business Submissions</button>
        </div>
      </div>
    </div>

    <div class="tab-content active" id="tab-comms">
      <div class="section">
        <div class="section-title"><span class="icon">🔔</span> Send Push Notification</div>
        <label>Title</label>
        <input type="text" id="pushTitle" placeholder="Notification title">
        <label>Body</label>
        <textarea id="pushBody" placeholder="Notification message..."></textarea>
        <button class="btn btn-gold" onclick="sendPush()" id="sendPushBtn">Send Notification</button>
      </div>

      <div class="section">
        <div class="section-title"><span class="icon">📢</span> Post Announcement</div>
        <label>Message</label>
        <textarea id="tickerMessage" placeholder="Type your announcement..."></textarea>
        <div class="row">
          <div>
            <label>Type</label>
            <select id="tickerType">
              <option value="info">Info</option>
              <option value="urgent">Urgent</option>
              <option value="event">Event</option>
              <option value="reminder">Reminder</option>
            </select>
          </div>
          <div>
            <label>Expires (optional)</label>
            <input type="datetime-local" id="tickerExpires">
          </div>
        </div>
        <button class="btn btn-primary" onclick="postTicker()" id="postTickerBtn">Post Announcement</button>
      </div>

      <div class="section">
        <div class="section-title"><span class="icon">📋</span> Active Announcements</div>
        <div id="tickerList"><div class="loading">Loading...</div></div>
      </div>

      <div class="section">
        <div class="section-title"><span class="icon">🕌</span> Jumu'ah Schedules</div>
        <div class="row">
          <div><label>Masjid</label><input type="text" id="jumuahMasjid" placeholder="Masjid name"></div>
        </div>
        <div class="row">
          <div><label>Khutbah Time</label><input type="text" id="jumuahKhutbah" placeholder="1:00 PM"></div>
          <div><label>Iqama Time</label><input type="text" id="jumuahIqama" placeholder="1:30 PM"></div>
        </div>
        <div class="row">
          <div><label>Speaker (optional)</label><input type="text" id="jumuahSpeaker" placeholder="Sheikh name"></div>
          <div><label>Topic (optional)</label><input type="text" id="jumuahTopic" placeholder="Khutbah topic"></div>
        </div>
        <button class="btn btn-primary" onclick="addJumuah()" id="addJumuahBtn">Add Schedule</button>
        <div id="jumuahList" style="margin-top:14px;"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <div class="tab-content" id="tab-businesses">
      <div class="section">
        <div class="section-title"><span class="icon">🏪</span> Business Submissions</div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button class="btn btn-sm" id="filterPending" onclick="loadBusinesses('pending')" style="background:#2A2318;color:#D4A843;">Pending</button>
          <button class="btn btn-sm" id="filterApproved" onclick="loadBusinesses('approved')" style="background:#1E1E1E;color:#9CA3AF;">Approved</button>
          <button class="btn btn-sm" id="filterRejected" onclick="loadBusinesses('rejected')" style="background:#1E1E1E;color:#9CA3AF;">Rejected</button>
        </div>
        <div id="businessList"><div class="loading">Loading...</div></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let adminToken = '';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isError ? ' error' : '');
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    async function doLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (!pw) return;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          adminToken = data.token;
          sessionStorage.setItem('adminToken', adminToken);
          document.getElementById('loginWrap').style.display = 'none';
          document.getElementById('appWrap').style.display = 'block';
          document.getElementById('loginError').style.display = 'none';
          loadTickers();
          loadBusinesses('pending');
          loadJumuah();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      } catch {
        document.getElementById('loginError').textContent = 'Connection error';
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function doLogout() {
      adminToken = '';
      sessionStorage.removeItem('adminToken');
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('appWrap').style.display = 'none';
      document.getElementById('passwordInput').value = '';
    }

    async function loadTickers() {
      try {
        const res = await fetch('/api/ticker');
        const msgs = await res.json();
        const list = document.getElementById('tickerList');
        if (!msgs.length) {
          list.innerHTML = '<div class="empty-state">No active announcements</div>';
          return;
        }
        list.innerHTML = '<ul class="message-list">' + msgs.map(m => {
          const badgeClass = 'badge-' + m.type;
          const date = new Date(m.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
          const expires = m.expires_at ? '<br>Expires: ' + new Date(m.expires_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
          return '<li class="message-item">' +
            '<span class="message-badge ' + badgeClass + '">' + m.type + '</span>' +
            '<div class="message-text">' + escHtml(m.message) + '<div class="message-meta">' + date + expires + '</div></div>' +
            '<div class="message-actions"><button class="btn btn-danger btn-sm" onclick="removeTicker(' + m.id + ')">Remove</button></div>' +
            '</li>';
        }).join('') + '</ul>';
      } catch {
        document.getElementById('tickerList').innerHTML = '<div class="empty-state">Failed to load</div>';
      }
    }

    async function postTicker() {
      const msg = document.getElementById('tickerMessage').value.trim();
      if (!msg) { showToast('Message is required', true); return; }
      const btn = document.getElementById('postTickerBtn');
      btn.disabled = true;
      try {
        const body = {
          message: msg,
          type: document.getElementById('tickerType').value,
        };
        const exp = document.getElementById('tickerExpires').value;
        if (exp) body.expires_at = new Date(exp).toISOString();
        const res = await fetch('/api/ticker', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          showToast('Announcement posted!');
          document.getElementById('tickerMessage').value = '';
          document.getElementById('tickerExpires').value = '';
          loadTickers();
        } else {
          const data = await res.json();
          showToast(data.error || 'Failed to post', true);
        }
      } catch { showToast('Connection error', true); }
      btn.disabled = false;
    }

    async function removeTicker(id) {
      if (!confirm('Remove this announcement?')) return;
      try {
        const res = await fetch('/api/ticker/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminToken },
        });
        if (res.ok) {
          showToast('Announcement removed');
          loadTickers();
        } else {
          showToast('Failed to remove', true);
        }
      } catch { showToast('Connection error', true); }
    }

    async function sendPush() {
      const title = document.getElementById('pushTitle').value.trim();
      const body = document.getElementById('pushBody').value.trim();
      if (!title || !body) { showToast('Title and body are required', true); return; }
      const btn = document.getElementById('sendPushBtn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/admin/push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
          body: JSON.stringify({ title, body }),
        });
        const data = await res.json();
        if (res.ok) {
          showToast('Notification sent to ' + (data.sent || 0) + ' device(s)');
          document.getElementById('pushTitle').value = '';
          document.getElementById('pushBody').value = '';
        } else {
          showToast(data.error || 'Failed to send', true);
        }
      } catch { showToast('Connection error', true); }
      btn.disabled = false;
    }

    let currentBizFilter = 'pending';

    async function loadBusinesses(status) {
      currentBizFilter = status || 'pending';
      ['Pending','Approved','Rejected'].forEach(s => {
        const btn = document.getElementById('filter' + s);
        if (s.toLowerCase() === currentBizFilter) {
          btn.style.background = '#2A2318';
          btn.style.color = '#D4A843';
        } else {
          btn.style.background = '#1E1E1E';
          btn.style.color = '#9CA3AF';
        }
      });
      const list = document.getElementById('businessList');
      list.innerHTML = '<div class="loading">Loading...</div>';
      try {
        const res = await fetch('/api/admin/businesses?status=' + currentBizFilter, {
          headers: { 'Authorization': 'Bearer ' + adminToken },
        });
        if (res.status === 401) { handleUnauthorized(); return; }
        const businesses = await res.json();
        if (!businesses.length) {
          list.innerHTML = '<div class="empty-state">No ' + currentBizFilter + ' businesses</div>';
          return;
        }
        list.innerHTML = '<ul class="message-list">' + businesses.map(b => {
          const date = new Date(b.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          const desc = b.description ? '<div style="font-size:12px;color:#9CA3AF;margin-top:4px;">' + escHtml(b.description) + '</div>' : '';
          const contact = [b.phone, b.website].filter(Boolean).join(' · ');
          const contactLine = contact ? '<div style="font-size:11px;color:#6B7280;margin-top:2px;">' + escHtml(contact) + '</div>' : '';
          const emailLine = '<div style="font-size:11px;color:#6B7280;margin-top:2px;">Submitted by: ' + escHtml(b.submitted_by_email) + '</div>';
          let actions = '';
          if (currentBizFilter === 'pending') {
            actions = '<button class="btn btn-primary btn-sm" onclick="updateBusiness(' + b.id + ',\'approved\')" style="margin-right:6px;">Approve</button>' +
                      '<button class="btn btn-danger btn-sm" onclick="updateBusiness(' + b.id + ',\'rejected\')">Reject</button>';
          } else if (currentBizFilter === 'approved') {
            actions = '<button class="btn btn-danger btn-sm" onclick="updateBusiness(' + b.id + ',\'rejected\')">Reject</button>';
          } else {
            actions = '<button class="btn btn-primary btn-sm" onclick="updateBusiness(' + b.id + ',\'approved\')">Approve</button>' +
                      '<button class="btn btn-danger btn-sm" onclick="deleteBusiness(' + b.id + ')" style="margin-left:6px;">Delete</button>';
          }
          return '<li class="message-item" style="flex-direction:column;gap:8px;">' +
            '<div style="display:flex;align-items:flex-start;gap:12px;width:100%;">' +
              '<span class="message-badge badge-event">' + escHtml(b.category) + '</span>' +
              '<div style="flex:1;">' +
                '<div style="font-size:14px;font-weight:600;color:#F5F5F5;">' + escHtml(b.name) + '</div>' +
                '<div style="font-size:12px;color:#9CA3AF;margin-top:2px;">' + escHtml(b.address) + '</div>' +
                desc + contactLine + emailLine +
                '<div class="message-meta">' + date + '</div>' +
              '</div>' +
            '</div>' +
            '<div style="display:flex;gap:6px;">' + actions + '</div>' +
          '</li>';
        }).join('') + '</ul>';
      } catch {
        list.innerHTML = '<div class="empty-state">Failed to load businesses</div>';
      }
    }

    async function updateBusiness(id, status) {
      try {
        const res = await fetch('/api/admin/businesses/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
          body: JSON.stringify({ status }),
        });
        if (res.ok) {
          const data = await res.json();
          showToast(escHtml(data.name) + ' ' + status);
          loadBusinesses(currentBizFilter);
        } else {
          showToast('Failed to update', true);
        }
      } catch { showToast('Connection error', true); }
    }

    async function deleteBusiness(id) {
      if (!confirm('Permanently delete this business?')) return;
      try {
        const res = await fetch('/api/admin/businesses/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminToken },
        });
        if (res.ok) {
          showToast('Business deleted');
          loadBusinesses(currentBizFilter);
        } else {
          showToast('Failed to delete', true);
        }
      } catch { showToast('Connection error', true); }
    }

    async function loadJumuah() {
      try {
        const res = await fetch('/api/admin/jumuah', { headers: { 'Authorization': 'Bearer ' + adminToken } });
        if (res.status === 401) { handleUnauthorized(); return; }
        const items = await res.json();
        const list = document.getElementById('jumuahList');
        if (!items.length) { list.innerHTML = '<div class="empty-state">No Jumu\'ah schedules</div>'; return; }
        list.innerHTML = '<ul class="message-list">' + items.map(j => {
          const status = j.active ? '' : ' (inactive)';
          const speaker = j.speaker ? '<br>Speaker: ' + escHtml(j.speaker) : '';
          const topic = j.topic ? '<br>Topic: ' + escHtml(j.topic) : '';
          return '<li class="message-item">' +
            '<span class="message-badge badge-event">' + escHtml(j.khutbah_time) + '</span>' +
            '<div class="message-text">' + escHtml(j.masjid) + status + speaker + topic +
            '<div class="message-meta">Iqama: ' + escHtml(j.iqama_time) + '</div></div>' +
            '<div class="message-actions" style="gap:6px;display:flex;">' +
            '<button class="btn btn-sm" style="background:#2A2318;color:#D4A843;" onclick="toggleJumuah(' + j.id + ',' + !j.active + ')">' + (j.active ? 'Disable' : 'Enable') + '</button>' +
            '<button class="btn btn-danger btn-sm" onclick="deleteJumuah(' + j.id + ')">Delete</button>' +
            '</div></li>';
        }).join('') + '</ul>';
      } catch { showToast('Failed to load Jumu\'ah schedules', true); }
    }

    async function addJumuah() {
      const masjid = document.getElementById('jumuahMasjid').value.trim();
      const khutbah_time = document.getElementById('jumuahKhutbah').value.trim();
      const iqama_time = document.getElementById('jumuahIqama').value.trim();
      const speaker = document.getElementById('jumuahSpeaker').value.trim();
      const topic = document.getElementById('jumuahTopic').value.trim();
      if (!masjid || !khutbah_time || !iqama_time) { showToast('Masjid, khutbah time, and iqama time are required', true); return; }
      try {
        const res = await fetch('/api/admin/jumuah', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
          body: JSON.stringify({ masjid, khutbah_time, iqama_time, speaker: speaker || null, topic: topic || null }),
        });
        if (res.ok) {
          showToast('Schedule added');
          document.getElementById('jumuahMasjid').value = '';
          document.getElementById('jumuahKhutbah').value = '';
          document.getElementById('jumuahIqama').value = '';
          document.getElementById('jumuahSpeaker').value = '';
          document.getElementById('jumuahTopic').value = '';
          loadJumuah();
        } else { showToast('Failed to add schedule', true); }
      } catch { showToast('Connection error', true); }
    }

    async function toggleJumuah(id, active) {
      try {
        const res = await fetch('/api/admin/jumuah/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
          body: JSON.stringify({ active }),
        });
        if (res.ok) { showToast(active ? 'Enabled' : 'Disabled'); loadJumuah(); }
        else { showToast('Failed to update', true); }
      } catch { showToast('Connection error', true); }
    }

    async function deleteJumuah(id) {
      if (!confirm('Delete this Jumu\'ah schedule?')) return;
      try {
        const res = await fetch('/api/admin/jumuah/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + adminToken },
        });
        if (res.ok) { showToast('Deleted'); loadJumuah(); }
        else { showToast('Failed to delete', true); }
      } catch { showToast('Connection error', true); }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    function handleUnauthorized() {
      adminToken = '';
      sessionStorage.removeItem('adminToken');
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('appWrap').style.display = 'none';
      showToast('Session expired — please sign in again', true);
    }

    const savedToken = sessionStorage.getItem('adminToken');
    if (savedToken) {
      adminToken = savedToken;
      fetch('/api/admin/verify', { headers: { 'Authorization': 'Bearer ' + adminToken } })
        .then(r => {
          if (r.ok) {
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('appWrap').style.display = 'block';
            loadTickers();
            loadBusinesses('pending');
            loadJumuah();
          } else {
            handleUnauthorized();
          }
        })
        .catch(() => handleUnauthorized());
    }
  </script>
</body>
</html>
