<!doctype html>
<html lang="en">
  <head>
    <title>Page Not Found — Salam Y'all</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/images/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />
    <link rel="stylesheet" href="/assets/brand.css">
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
      }
      .container { max-width: 420px; width: 100%; }
      .icon { width: 72px; height: 72px; margin: 0 auto 24px; }
      .code {
        font-size: 96px;
        font-weight: 800;
        color: var(--emerald);
        line-height: 1;
        letter-spacing: -4px;
        margin-bottom: 16px;
      }
      .code span { color: var(--gold); }
      h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
      .subtitle { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 40px; }
      .links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
      .footer {
        font-size: 12px;
        color: var(--text-muted);
        padding-top: 24px;
        border-top: 1px solid var(--divider);
      }
      .footer a { color: var(--text-secondary); text-decoration: none; margin: 0 8px; }
      .footer a:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/assets/images/favicon.png" alt="Salam Y'all" class="icon" />

      <div class="code">4<span>0</span>4</div>
      <h1>Page Not Found</h1>
      <p class="subtitle">The page you're looking for doesn't exist or may have moved.</p>

      <div class="links">
        <a href="/" class="btn-primary">Go to Homepage</a>
        <a href="/community" class="btn-secondary">Community Events &amp; Directory</a>
        <a href="/download" class="btn-secondary">Download the App</a>
      </div>

      <div class="footer">
        <a href="/privacy">Privacy Policy</a>
        <a href="/support">Support</a>
      </div>
    </div>
  </body>
</html>
