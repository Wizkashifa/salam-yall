<!doctype html>
<html lang="en">
  <head>
    <title>Salam Y'all — Your Muslim Community App</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Salam Y'all connects the Muslim community with prayer times, halal restaurants, local businesses, events, and more." />

    <meta property="og:description" content="Your Muslim Community App — Prayer times, halal eats, events, and local directory all in one place." />

    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
      }
      .container { max-width: 420px; width: 100%; }
      .crescent { width: 72px; height: 72px; margin: 0 auto 24px; }
      h1 { font-size: 36px; font-weight: 700; color: var(--gold); margin-bottom: 8px; letter-spacing: -0.5px; }
      .tagline { font-size: 16px; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.5; }
      .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 40px;
        text-align: left;
      }
      .feature {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
      }
      .feature-icon { font-size: 20px; flex-shrink: 0; }
      .feature-text { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
      .download-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px 24px;
        background: var(--emerald);
        color: #fff;
        font-size: 17px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-lg);
        text-decoration: none;
        cursor: pointer;
        transition: background 0.2s;
        margin-bottom: 12px;
      }
      .download-btn:hover { background: var(--emerald-hover); }
      .download-btn svg { width: 22px; height: 22px; fill: currentColor; }
      .store-note { font-size: 13px; color: var(--text-muted); margin-bottom: 48px; }
      .footer {
        font-size: 12px;
        color: var(--text-muted);
        padding-top: 24px;
        border-top: 1px solid var(--divider);
        width: 100%;
      }
      .footer a { color: var(--text-secondary); text-decoration: none; margin: 0 8px; }
      .footer a:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/assets/images/favicon.png" alt="Salam Y'all" class="crescent" />

      <h1>Salam Y'all</h1>
      <p class="tagline">Your Muslim Community App</p>

      <div class="features">
        <div class="feature">
          <span class="feature-icon">🕌</span>
          <span class="feature-text">Prayer &amp; Iqama Times</span>
        </div>
        <div class="feature">
          <span class="feature-icon">🍽️</span>
          <span class="feature-text">Halal Restaurants</span>
        </div>
        <div class="feature">
          <span class="feature-icon">📅</span>
          <span class="feature-text">Community Events</span>
        </div>
        <div class="feature">
          <span class="feature-icon">📒</span>
          <span class="feature-text">Local Directory</span>
        </div>
      </div>

      <a href="https://apps.apple.com/us/app/salam-yall/id6760231963" class="download-btn" id="download">
        <svg viewBox="0 0 24 24">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Download on the App Store
      </a>
      <p class="store-note">Free on iOS</p>

      <div class="footer">
        <a href="/privacy">Privacy Policy</a>
        <a href="/support">Support</a>
      </div>
    </div>

    <script>
      (function() {
        var ua = navigator.userAgent;
        var isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) {
          window.location.href = 'https://apps.apple.com/us/app/salam-yall/id6760231963';
        }
      })();
    </script>
  </body>
</html>
