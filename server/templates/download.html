<!doctype html>
<html lang="en">
  <head>
    <title>Salam Y'all — Your Triangle Muslim Community App</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Salam Y'all connects the Triangle NC Muslim community with prayer times, halal restaurants, local businesses, events, and more." />
    <meta property="og:title" content="Salam Y'all" />
    <meta property="og:description" content="Your Triangle Muslim Community App — Prayer times, halal eats, events, and local directory all in one place." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://salamyall.net/app" />
    <meta property="og:site_name" content="Salam Y'all" />
    <meta property="og:image" content="https://salamyall.net/assets/images/og-share.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="675" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Salam Y'all" />
    <meta name="twitter:description" content="Your Triangle Muslim Community App" />
    <meta name="apple-itunes-app" content="app-id=6760231963" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0C0C0C;
        color: #F5F5F5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
      }
      .container {
        max-width: 420px;
        width: 100%;
      }
      .crescent {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
      }
      h1 {
        font-size: 36px;
        font-weight: 700;
        color: #D4A843;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .tagline {
        font-size: 16px;
        color: #9CA3AF;
        margin-bottom: 40px;
        line-height: 1.5;
      }
      .features {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 40px;
        text-align: left;
      }
      .feature {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px;
        background: #161616;
        border: 1px solid #252525;
        border-radius: 12px;
      }
      .feature-icon {
        font-size: 20px;
        flex-shrink: 0;
      }
      .feature-text {
        font-size: 13px;
        font-weight: 500;
        color: #E5E5E5;
        line-height: 1.3;
      }
      .download-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px 24px;
        background: #1B6B4A;
        color: #fff;
        font-size: 17px;
        font-weight: 600;
        border: none;
        border-radius: 14px;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.2s;
        margin-bottom: 12px;
      }
      .download-btn:hover { background: #14523A; }
      .download-btn svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
      }
      .store-note {
        font-size: 13px;
        color: #6B7280;
        margin-bottom: 48px;
      }
      .footer {
        font-size: 12px;
        color: #4B5563;
        padding-top: 24px;
        border-top: 1px solid #1E1E1E;
        width: 100%;
      }
      .footer a {
        color: #6B7280;
        text-decoration: none;
        margin: 0 8px;
      }
      .footer a:hover { color: #9CA3AF; }

      @media (prefers-color-scheme: light) {
        body { background: #FAFAF8; color: #1a1a1a; }
        .feature { background: #fff; border-color: #E5E5E5; }
        .feature-text { color: #374151; }
        .tagline { color: #6B7280; }
        .store-note { color: #9CA3AF; }
        .footer { border-top-color: #E5E5E5; color: #9CA3AF; }
        .footer a { color: #6B7280; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="crescent" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="44" stroke="#1B6B4A" stroke-width="3" fill="none"/>
        <path d="M62 14C50.5 20 43 33.5 43 50s7.5 30 19 36c-4 2.5-8.5 4-13.5 4C28 90 12 72 12 50S28 10 48.5 10c4.5 0 9 .8 13.5 4z" fill="#1B6B4A"/>
        <circle cx="68" cy="28" r="5" fill="#D4A843"/>
      </svg>

      <h1>Salam Y'all</h1>
      <p class="tagline">Your Triangle NC Muslim Community App</p>

      <div class="features">
        <div class="feature">
          <span class="feature-icon">🕌</span>
          <span class="feature-text">Prayer &amp; Iqama Times</span>
        </div>
        <div class="feature">
          <span class="feature-icon">🍽️</span>
          <span class="feature-text">Halal Restaurants</span>
        </div>
        <div class="feature">
          <span class="feature-icon">📅</span>
          <span class="feature-text">Community Events</span>
        </div>
        <div class="feature">
          <span class="feature-icon">📒</span>
          <span class="feature-text">Local Directory</span>
        </div>
      </div>

      <a href="https://apps.apple.com/us/app/salam-yall/id6760231963" class="download-btn" id="download">
        <svg viewBox="0 0 24 24">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Download on the App Store
      </a>
      <p class="store-note">Free on iOS</p>

      <div class="footer">
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/support">Support</a>
      </div>
    </div>

    <script>
      (function() {
        var ua = navigator.userAgent;
        var isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) {
          window.location.href = 'https://apps.apple.com/us/app/salam-yall/id6760231963';
        }
      })();
    </script>
  </body>
</html>
